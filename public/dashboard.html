<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - EduPredict</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; background-color: #F8FAFC; }</style>
</head>
<body class="text-slate-800 hidden" id="dashboardBody">
    <nav class="bg-white px-8 py-4 flex justify-between items-center border-b border-slate-200 shadow-sm">
        <div class="flex items-center gap-2">
            <div class="bg-indigo-600 text-white font-bold text-sm px-2 py-1 rounded">AI</div>
            <span class="text-xl font-bold text-slate-900">EduPredict</span>
        </div>
        <div class="flex items-center gap-4">
            <div class="text-right">
                <p class="font-bold text-sm text-slate-700" id="adminEmail">Loading...</p>
                <p class="text-[10px] text-slate-400 font-semibold tracking-wider">ADMINISTRATOR</p>
            </div>
            <button id="logoutBtn" class="text-red-500 font-medium text-sm hover:text-red-700 ml-4 border border-red-100 bg-red-50 px-4 py-2 rounded-lg transition">Keluar Akses</button>
        </div>
    </nav>

    <main class="p-8 max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-bold">Data Mahasiswa Aktif</h2>
            <button id="addStudentBtn" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg font-medium transition shadow-sm">+ Tambah Data</button>
        </div>

        <div class="bg-white rounded-xl border border-slate-100 shadow-sm overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-50 text-slate-500 text-xs uppercase tracking-wider border-b border-slate-100">
                            <th class="p-4 font-semibold">NIM</th>
                            <th class="p-4 font-semibold">Nama Mahasiswa</th>
                            <th class="p-4 font-semibold">IPK</th>
                            <th class="p-4 font-semibold">Kehadiran</th>
                            <th class="p-4 font-semibold">Status AI</th>
                        </tr>
                    </thead>
                    <tbody id="studentTableBody" class="divide-y divide-slate-50">
                        <tr>
                            <td colspan="5" class="p-8 text-center text-slate-400 italic">Memuat data dari database...</td>
                        </tr>
                        <div id="addModal" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex items-center justify-center hidden">
        <div class="bg-white w-full max-w-lg rounded-2xl shadow-xl overflow-hidden transform transition-all">
            <div class="px-6 py-4 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                <h3 class="font-bold text-slate-800 text-lg">Tambah Data Mahasiswa</h3>
                <button id="closeModalBtn" class="text-slate-400 hover:text-rose-500 transition font-bold text-xl">&times;</button>
            </div>
            
            <form id="addStudentForm" class="p-6 space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div class="col-span-2">
                        <label class="block text-sm font-medium text-slate-700 mb-1">NIM Mahasiswa</label>
                        <input type="text" id="nim" required class="w-full px-3 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-600 outline-none" placeholder="Misal: 202603001">
                    </div>
                    <div class="col-span-2">
                        <label class="block text-sm font-medium text-slate-700 mb-1">Nama Lengkap</label>
                        <input type="text" id="nama" required class="w-full px-3 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-600 outline-none" placeholder="Nama sesuai KTM">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">IPK Terakhir</label>
                        <input type="number" id="gpa" step="0.01" min="0" max="4.00" required class="w-full px-3 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-600 outline-none" placeholder="0.00 - 4.00">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Kehadiran (%)</label>
                        <input type="number" id="attendance" step="0.1" min="0" max="100" required class="w-full px-3 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-600 outline-none" placeholder="0 - 100">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Nilai Mata Kuliah Inti</label>
                        <input type="number" id="core_grade" step="0.01" min="0" max="4.00" required class="w-full px-3 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-600 outline-none" placeholder="0.00 - 4.00">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Status Akademik</label>
                        <select id="status" required class="w-full px-3 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-600 outline-none bg-white">
                            <option value="Aktif">Aktif</option>
                            <option value="Cuti">Cuti</option>
                            <option value="Peringatan">Peringatan</option>
                        </select>
                    </div>
                </div>

                <div class="pt-4 mt-6 border-t border-slate-100 flex justify-end gap-3">
                    <button type="button" id="cancelBtn" class="px-5 py-2 text-slate-600 font-medium hover:bg-slate-100 rounded-lg transition">Batal</button>
                    <button type="submit" id="saveBtn" class="px-5 py-2 bg-indigo-600 hover:bg-indigo-700 text-white font-medium rounded-lg transition shadow-sm">Simpan Data</button>
                </div>
            </form>
        </div>
    </div>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script type="module" src="assets/js/crud.js"></script>
</body>
</html>
